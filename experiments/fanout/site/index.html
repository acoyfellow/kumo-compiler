<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kumo → Vue · Svelte · Solid</title>
  <link rel="stylesheet" href="/kumo.css" />
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; color: #1a1a1a; background: #fafafa; line-height: 1.5; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 64px 24px 96px; }
    h1 { font-size: 28px; font-weight: 650; letter-spacing: -0.02em; margin: 0 0 8px; }
    .lede { color: #555; font-size: 16px; margin: 0 0 8px; max-width: 60ch; }
    .meta { color: #888; font-size: 13px; margin: 0 0 48px; }
    h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #888; margin: 56px 0 16px; }
    .row { display: grid; grid-template-columns: 160px 1fr 1fr 1fr; gap: 1px; background: #e6e6e6; border: 1px solid #e6e6e6; border-radius: 10px; overflow: hidden; }
    .row > div { background: #fff; padding: 16px; min-height: 64px; }
    .head { background: #f4f4f4 !important; font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.04em; display: flex; align-items: center; }
    .name { font-weight: 600; font-size: 14px; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
    .parity { font-size: 11px; color: #15803d; font-weight: 600; }
    .demo { display: flex; align-items: center; }
    .todo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .todo { background: #fff; border: 1px dashed #cbcbcb; border-radius: 10px; padding: 16px; }
    .todo .t { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .tag { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 2px 6px; border-radius: 4px; }
    .tag.todo { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .tag.done { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .todo .why { font-size: 12px; color: #777; margin-top: 8px; }
    .foot { margin-top: 56px; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 16px; }
    code { font-family: ui-monospace, monospace; font-size: 12px; background: #f2f2f2; padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
