<link rel="stylesheet" href="/form/solid/assets/main.css"><div id="app"><main class="form-shell"><h1>Form family</h1><section class="form-grid"><article class="form-card" data-member="field"><h2>Field</h2><div class="field"><label for="field-value">Project name</label><input class="control" id="field-value" value="Kumo"><small>Visible to your team.</small></div></article><article class="form-card" data-member="input"><h2>Input</h2><label class="field" for="email"><span>Email address</span><input class="control" id="email" type="email" placeholder="you@example.com"></label></article><article class="form-card" data-member="input-group"><h2>Input Group</h2><label class="field" for="domain"><span>Domain</span><span class="group"><span>https://</span><input id="domain" value="example.com"></span></label></article><article class="form-card" data-member="input-area"><h2>Input Area</h2><label class="field" for="notes"><span>Notes</span><textarea class="control" id="notes">Compiler proof</textarea></label></article><article class="form-card" data-member="sensitive-input"><h2>Sensitive Input</h2><label class="field" for="secret"><span>API token</span><span class="row"><input class="control" id="secret" type="password" value="secret-123"><button class="action reveal" type="button" aria-pressed="false">Show</button></span></label></article><article class="form-card" data-member="clipboard-text"><h2>Clipboard Text</h2><div class="field"><label for="copy-value">Install command</label><span class="row"><input class="control" id="copy-value" readonly value="npm i kumo"><button class="action copy" type="button">Copy</button></span><p class="status" role="status"></p></div></article></section></main></div><script type="module" src="/src/main.js"></script>
