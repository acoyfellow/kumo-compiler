<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>input-area / solid</title>
  <link rel="stylesheet" href="./kumo.css" />
<style id="kumo-gallery-frame-fix">
  html{background:transparent}
  body{margin:0;background:transparent;display:flex;align-items:center;justify-content:center;min-height:auto}
  /* Tame the demo wrapper's large p-8 padding and center its content. */
  main[data-part="root"]{padding:1.25rem!important;margin:0!important;width:auto!important;
    display:flex;align-items:center;justify-content:center}
  /* JS-mounted apps (overlays) mount here. */
  #app{width:100%;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<main class="p-8" data-component="input-area" data-part="root" data-state="default"><textarea class="bg-kumo-control border-0 disabled:text-kumo-disabled focus:outline-none focus:ring-[1.5px] focus:ring-kumo-focus/50 gap-1.5 h-auto kumo-input-placeholder outline-none px-3 py-2 ring ring-kumo-line rounded-lg text-base text-kumo-default" data-part="control" placeholder="Write a message"></textarea></main>
</body>
</html>
