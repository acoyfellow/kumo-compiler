<!doctype html><html><head><meta charset="utf-8"><title>sensitive-input comparison</title><style>body{font-family:system-ui;background:#eef2f7;margin:20px}main{max-width:820px;margin:auto}.tabs{display:flex;gap:8px}button{padding:8px 14px}iframe{width:100%;height:560px;border:1px solid #ccd3dc;background:white;margin-top:12px}</style></head><body><main><h1>sensitive-input runtime comparison</h1><div class="tabs" role="tablist"><button role="tab" aria-selected="true" data-f="react">react</button><button role="tab" aria-selected="false" data-f="vue">vue</button><button role="tab" aria-selected="false" data-f="svelte">svelte</button><button role="tab" aria-selected="false" data-f="solid">solid</button></div><iframe title="sensitive-input runtime" src="/sensitive-input/react/"></iframe></main><script>for(const b of document.querySelectorAll('[data-f]'))b.onclick=()=>{document.querySelectorAll('[data-f]').forEach(x=>x.setAttribute('aria-selected',String(x===b)));document.querySelector('iframe').src='/sensitive-input/'+b.dataset.f+'/'}</script></body></html>
