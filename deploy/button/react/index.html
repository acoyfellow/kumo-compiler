<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><title>Button React</title><style>*{box-sizing:border-box}body{margin:0;padding:24px;background:#fff;color:#1f2937;font-family:Arial,sans-serif}.button-shell{max-width:520px}.button-shell h1{font-size:28px;margin:0 0 18px}.button-matrix{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.kumo-button{height:36px;padding:0 16px;border:1px solid transparent;border-radius:8px;font:600 14px Arial;cursor:pointer}.kumo-button.primary{background:#2563eb;color:#fff}.kumo-button.secondary{background:#e5e7eb;color:#111827}.kumo-button.outline{background:#fff;color:#1f2937;border-color:#9ca3af}.kumo-button.danger{background:#dc2626;color:#fff}.kumo-button.ghost{background:transparent;color:#2563eb}.kumo-button.xs{height:28px;font-size:12px;padding:0 10px}.kumo-button.sm{height:32px;font-size:13px}.kumo-button.lg{height:44px;font-size:16px}.kumo-button:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}.kumo-button:focus{outline:2px solid #60a5fa;outline-offset:2px}.count{font-variant-numeric:tabular-nums}
</style></head><body><div id="app"><main class="button-shell"><h1>Button</h1><section class="button-matrix"><button type="button" class="kumo-button primary base">Primary</button><button type="button" class="kumo-button secondary base">Secondary</button><button type="button" class="kumo-button outline base">Outline</button><button type="button" class="kumo-button danger base">Danger</button><button type="button" class="kumo-button ghost base">Ghost</button><button type="button" class="kumo-button primary xs">Extra small</button><button type="button" class="kumo-button primary sm">Small</button><button type="button" class="kumo-button primary lg">Large</button><button type="button" class="kumo-button primary base" disabled="" aria-disabled="true">Disabled</button><button type="button" class="kumo-button primary base" disabled="" aria-busy="true">Loading…</button><button type="button" class="kumo-button primary base" aria-label="Add item">+</button><button type="submit" class="kumo-button primary base">Submit</button></section></main></div><script type="module" src="/button/react/assets/react-button.js"></script></body></html>
