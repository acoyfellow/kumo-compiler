<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Button runtime comparison</title><style>*{box-sizing:border-box}body{margin:0;padding:28px;background:#f3f4f6;font-family:Arial}h1{margin:0 0 20px}.compare{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}.panel{overflow:hidden;border:1px solid #d1d5db;border-radius:12px;background:white}.panel h2{margin:0;padding:12px 16px;border-bottom:1px solid #ddd;font-size:14px;text-transform:capitalize}.panel iframe{display:block;width:100%;height:500px;border:0}@media(max-width:1000px){.compare{grid-template-columns:1fr}}</style></head><body><h1>Button runtime comparison</h1><main class="compare"><section class="panel"><h2>react</h2><iframe title="react Button runtime" src="/button/react"></iframe></section><section class="panel"><h2>vue</h2><iframe title="vue Button runtime" src="/button/vue"></iframe></section><section class="panel"><h2>svelte</h2><iframe title="svelte Button runtime" src="/button/svelte"></iframe></section><section class="panel"><h2>solid</h2><iframe title="solid Button runtime" src="/button/solid"></iframe></section></main></body></html>
