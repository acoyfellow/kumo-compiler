<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Select React</title><style>*{box-sizing:border-box}body{margin:0;padding:24px;background:#fff;color:#1f2937;font-family:Arial,sans-serif}.shell{max-width:520px}.title{font-size:28px;margin:0 0 18px}.matrix{display:flex;flex-direction:column;gap:24px}.kumo-field{display:grid;align-content:start;gap:6px;position:relative;min-width:0}.kumo-field label{font-size:14px;font-weight:600}.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.kumo-trigger{width:100%;height:36px;padding:0 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#1f2937;display:flex;align-items:center;justify-content:space-between;font:14px Arial;text-align:left}.kumo-trigger.xs{height:28px;font-size:12px}.kumo-trigger.sm{height:32px;font-size:13px}.kumo-trigger.lg{height:44px;font-size:16px}.kumo-trigger:disabled{background:#f3f4f6;color:#9ca3af}.kumo-trigger:focus{outline:2px solid #3b82f6;outline-offset:1px}.kumo-field ul{position:absolute;z-index:2;top:58px;left:0;right:0;padding:4px;margin:0;list-style:none;background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 6px 16px #0002}.kumo-field li{padding:8px;border-radius:5px;cursor:pointer}.kumo-field li:hover,.kumo-field li[aria-selected=true]{background:#eef2ff}.description,.error{margin:0;font-size:12px}.description{color:#6b7280}.error{color:#b91c1c}
</style></head><body><div id="app"><main class="shell"><h1 class="title">Select</h1><section class="matrix"><div class="kumo-field"><label for="extra-small-listbox-trigger">Extra small</label><button type="button" role="combobox" id="extra-small-listbox-trigger" aria-controls="extra-small-listbox" aria-expanded="false" aria-haspopup="listbox" class="kumo-trigger xs"><span>Choose fruit</span><svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16"><path fill="currentColor" d="m4 6 4 4 4-4z"></path></svg></button></div><div class="kumo-field"><label for="small-listbox-trigger">Small</label><button type="button" role="combobox" id="small-listbox-trigger" aria-controls="small-listbox" aria-expanded="false" aria-haspopup="listbox" class="kumo-trigger sm"><span>Apple</span><svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16"><path fill="currentColor" d="m4 6 4 4 4-4z"></path></svg></button></div><div class="kumo-field"><label for="base-listbox-trigger">Base</label><button type="button" role="combobox" id="base-listbox-trigger" aria-controls="base-listbox" aria-expanded="false" aria-haspopup="listbox" class="kumo-trigger base"><span>Choose fruit</span><svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16"><path fill="currentColor" d="m4 6 4 4 4-4z"></path></svg></button><p class="description">Choose the closest region.</p></div><div class="kumo-field"><label for="large-listbox-trigger">Large</label><button type="button" role="combobox" id="large-listbox-trigger" aria-controls="large-listbox" aria-expanded="false" aria-haspopup="listbox" class="kumo-trigger lg"><span>Cherry</span><svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16"><path fill="currentColor" d="m4 6 4 4 4-4z"></path></svg></button></div><div class="kumo-field"><label for="loading-listbox-trigger">Loading</label><button type="button" role="combobox" id="loading-listbox-trigger" aria-controls="loading-listbox" aria-expanded="false" aria-haspopup="listbox" aria-busy="true" disabled="" class="kumo-trigger base"><span>Loading…</span><svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16"><path fill="currentColor" d="m4 6 4 4 4-4z"></path></svg></button></div><div class="kumo-field"><label for="hidden-label-listbox-trigger" class="sr-only">Hidden label</label><button type="button" role="combobox" id="hidden-label-listbox-trigger" aria-controls="hidden-label-listbox" aria-expanded="false" aria-haspopup="listbox" class="kumo-trigger base"><span>Hidden label</span><svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16"><path fill="currentColor" d="m4 6 4 4 4-4z"></path></svg></button></div><div class="kumo-field"><label for="disabled-listbox-trigger">Disabled</label><button type="button" role="combobox" id="disabled-listbox-trigger" aria-controls="disabled-listbox" aria-expanded="false" aria-haspopup="listbox" disabled="" class="kumo-trigger base"><span>Unavailable</span><svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16"><path fill="currentColor" d="m4 6 4 4 4-4z"></path></svg></button></div><div class="kumo-field"><label for="error-listbox-trigger">Error</label><button type="button" role="combobox" id="error-listbox-trigger" aria-controls="error-listbox" aria-expanded="false" aria-haspopup="listbox" aria-invalid="true" class="kumo-trigger base"><span>Select an option</span><svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16"><path fill="currentColor" d="m4 6 4 4 4-4z"></path></svg></button><p class="error">Selection required</p></div></section></main></div><script type="module" src="/select/react/assets/react-select.js"></script></body></html>
