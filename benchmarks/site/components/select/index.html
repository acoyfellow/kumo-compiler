<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Select benchmark</title><style>body{font:15px system-ui;margin:0;background:#f5f7fa;color:#172033}main{max-width:1500px;margin:auto;padding:32px}a{color:#0759b6}.note,.panel{background:#fff;border:1px solid #dce1ea;border-radius:10px;padding:18px}.note{margin-bottom:20px}.frames{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.panel h2{margin-top:0;text-transform:capitalize}.panel iframe{border:0;width:100%;height:620px}@media(max-width:900px){.frames{grid-template-columns:1fr}}</style></head><body><main><p><a href="/benchmarks/">← Catalog</a></p><h1>Select baseline</h1><div class="note"><strong>Fixture:</strong> kitchen sink. These sandboxed pages are isolated from dashboard chrome. Timing, payload, and visual values are shown only where recorded by benchmark evidence.</div><section class="frames" id="frames"></section></main><script>fetch('/benchmarks/data/catalog.json').then(r=>r.json()).then(c=>{let x=c.components.find(x=>x.id==='select');document.querySelector('#frames').innerHTML=x.frameworks.map(f=>`<article class="panel"><h2>${f}</h2><p><a href="${x.routes[f]}">Open isolated fixture</a></p><iframe sandbox="allow-scripts" title="${f} Select" src="${x.routes[f]}"></iframe></article>`).join('')})</script></body></html>
