<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Benchmark catalog</title><style>body{font:15px system-ui;margin:0;background:#f5f7fa;color:#172033}main{max-width:1100px;margin:auto;padding:40px}header,.card{background:white;border:1px solid #dce1ea;border-radius:12px;padding:24px;margin-bottom:18px}.muted{color:#64748b}.badge{background:#dcfce7;color:#166534;padding:4px 9px;border-radius:99px}a{color:#0759b6}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.metric{background:#f8fafc;padding:14px;border-radius:8px}.metric strong{display:block;font-size:20px}</style></head><body><main><header><h1>Component benchmark catalog</h1><p class="muted">Measured evidence only. Metrics are tied to their source commit and benchmark artifacts.</p></header><section id="catalog">Loading catalog…</section></main><script>fetch('/benchmarks/data/catalog.json').then(r=>r.json()).then(c=>{document.querySelector('#catalog').innerHTML=c.components.map(x=>`<article class="card"><span class="badge">${x.status}</span><h2><a href="${x.routes.dashboard}">${x.name}</a></h2><p>${x.frameworks.length} framework runtimes</p><div class="grid"><div class="metric"><strong>${x.metrics?.runtimeBuildMedianMs == null ? '—' : x.metrics.runtimeBuildMedianMs.toFixed(1)+' ms'}</strong>runtime build median</div><div class="metric"><strong>${x.metrics?.runtimeBuildP95Ms == null ? '—' : x.metrics.runtimeBuildP95Ms.toFixed(1)+' ms'}</strong>runtime build p95</div></div><p class="muted">Source ${c.source.commit}</p></article>`).join('')}).catch(e=>document.querySelector('#catalog').textContent=e.message)</script></body></html>
